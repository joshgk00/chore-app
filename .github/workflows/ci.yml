name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --run

  docker:
    name: Docker Build & Smoke Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chore-app .

      - name: Smoke test
        run: |
          docker run -d --name chore-test \
            -p 3000:3000 \
            -e PUBLIC_ORIGIN=http://localhost:3000 \
            -e INITIAL_ADMIN_PIN=123456 \
            chore-app
          sleep 5
          curl --fail http://localhost:3000/api/health
          docker stop chore-test
          docker rm chore-test
